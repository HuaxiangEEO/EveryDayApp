# 首次使用需执行: flutter create . --platforms=windows 生成 Windows 平台文件
name: cloud_storage
description: PC端网盘文件管理应用，支持本地/云端文件浏览、上传、下载、新建文件夹等操作
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # 文件选择、路径
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  path: ^1.9.0
  # 桌面窗口控制
  window_manager: ^0.3.7
  # 图标扩展
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
